<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>The Fin AI · Community</title>
    <meta name="theme-color" content="#0a0d12" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <script>
      // No-FOUC theme: apply saved theme before first paint (default dark).
      try {
        var t = localStorage.getItem('theme');
        if (t !== 'light' && t !== 'dark') t = 'dark';
        document.documentElement.setAttribute('data-theme', t);
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
      // Apply saved locale to <html lang> before first paint so i18n picks it up.
      try {
        var lc = localStorage.getItem('locale');
        if (lc !== 'en' && lc !== 'zh' && lc !== 'ja' && lc !== 'fr') {
          var n = (navigator.language || 'en').toLowerCase();
          lc = n.indexOf('zh') === 0 ? 'zh' : n.indexOf('ja') === 0 ? 'ja' : n.indexOf('fr') === 0 ? 'fr' : 'en';
        }
        document.documentElement.setAttribute('lang', lc);
      } catch (e) {
        document.documentElement.setAttribute('lang', 'en');
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
