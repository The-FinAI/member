name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PUBLIC_SUPABASE_URL: https://ufptxtezwpsnvtolrfqo.supabase.co
      PUBLIC_SUPABASE_ANON_KEY: sb_publishable_tt5csbokBHJE2siaIQl6_Q_MhSMSrwv
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run build
      # GitHub Pages serves 404.html for unknown paths; the SPA needs it to
      # route client-side deep links back through the app shell.
      - run: cp build/index.html build/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
